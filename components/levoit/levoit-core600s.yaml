substitutions:
  name: "levoit-core600s"

esphome:
  name: ${name}
  project:
    name: "Levoit.Core600s"
    version: "1.0.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

# Enable logging
logger:
  level: VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Levoit-Core600S"
    password: !secret wifi_ap_password

captive_portal:

external_components:
  - source: ../../components
    components: [levoit]

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: GPIO17
      inverted: false
    rx_pin:
      number: GPIO16
      inverted: false
    baud_rate: 115200

levoit:
  id: levoitcore600
  model: CORE600S

fan:
  - platform: levoit
    levoit: levoitcore600
    name: "Fan"
    id: levoit_fan1

switch:
  - platform: levoit
    levoit: levoitcore600
    name: "Display"
    type: display
  - platform: levoit
    levoit: levoitcore600
    name: "Child Lock"
    type: child_lock
  - platform: levoit
    levoit: levoitcore600
    name: "Light Detect"
    type: light_detect

number:
  - platform: levoit
    levoit: levoitcore600
    name: "Auto Mode Room Size"
    type: efficiency_room_size
  - platform: levoit
    levoit: levoitcore600
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: levoitcore600
    name: "Filter Months"
    type: filter_lifetime_months

sensor:
  - platform: levoit
    levoit: levoitcore600
    name: "AQ - PM 2.5"
    type: pm25
  - platform: levoit
    levoit: levoitcore600
    name: "AQI"
    type: aqi
  - platform: levoit
    levoit: levoitcore600
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: levoitcore600
    name: "Filter %"
    type: filter_life_left

select:
  - platform: levoit
    levoit: levoitcore600
    name: "Auto Mode"
    type: auto_mode

text_sensor:
  - platform: levoit
    levoit: levoitcore600
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: levoitcore600
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: levoitcore600
    name: "Timer Duration"
    type: timer_duration_initial
  - platform: levoit
    levoit: levoitcore600
    name: "Timer Remaining"
    type: timer_duration_remaining
  - platform: levoit
    levoit: levoitcore600
    name: "Error"
    type: error_message

button:
  - platform: levoit
    levoit: levoitcore600
    name: "Filter Reset"
    type: reset_filter_stats

binary_sensor:
  - platform: levoit
    levoit: levoitcore600
    name: "Filter Low"
    type: filter_low
