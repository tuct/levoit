esphome:
  name: levoit-vital100s

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: esp-idf
# original ESP32-SOLO-1C!
#esp32:
#  board: esp32dev
#  framework:
#    type: esp-idf
#    sdkconfig_options:
#      CONFIG_FREERTOS_UNICORE: y

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Levoit-Vital100S"
    password: !secret wifi_ap_password

captive_portal:
external_components:
  - source: ../../components
    components: [levoit]

uart:
  - id: uart_mcu2esp
    tx_pin: 
      number: GPIO17
      inverted: false
    rx_pin: 
      number: GPIO16
      inverted: false
    baud_rate: 115200
levoit:
  id: levoitvital100
  model: "VITAL100S"
fan:
  - platform: levoit
    levoit: levoitvital100
    name: "Fan"
    id: levoit_fan1  
switch:
  - platform: levoit
    levoit: levoitvital100
    name: "Display"
    type: display
  - platform: levoit
    levoit: levoitvital100
    name: "Child Lock"
    type: child_lock

number:
  - platform: levoit
    levoit: levoitvital100
    name: "Auto Mode Room Size"
    type: efficiency_room_size
  - platform: levoit
    levoit: levoitvital100
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: levoitvital100
    name: "Filter Months"
    type: filter_lifetime_months
sensor:

  - platform: levoit
    levoit: levoitvital100
    name: "AQ - PM 2.5"
    type: pm25
  - platform: levoit
    levoit: levoitvital100
    name: "AQI"
    type: aqi
  - platform: levoit
    levoit: levoitvital100
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: levoitvital100
    name: "Filter %"
    type: filter_life_left
# Better: auto_mode_room_size_high_fan text_sensor    
#  - platform: levoit
#    levoit: levoitvital100
#    name: "Efficiency Count Dowmn Timer (sec)"
#    type: efficiency_counter
# Better: timer_duration_remaining text_sensor    
#  - platform: levoit
#    levoit: levoitvital100
#    name: "Timer Remaining"
#    type: timer_current
select:
  - platform: levoit
    levoit: levoitvital100
    name: "Auto Mode"
    type: auto_mode
text_sensor:
  - platform: levoit
    levoit: levoitvital100
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: levoitvital100
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: levoitvital100
    name: "Timer Duration"
    type: timer_duration_initial
  - platform: levoit
    levoit: levoitvital100
    name: "Timer Remaining"
    type: timer_duration_remaining
  - platform: levoit
    levoit: levoitvital100
    name: "Auto: High remaining run time"
    type: auto_mode_room_size_high_fan
  - platform: levoit
    levoit: levoitvital100
    name: "Error"
    type: error_message
button:
  - platform: levoit
    levoit: levoitvital100
    name: "Filter Reset"
    type: reset_filter_stats
binary_sensor:
  - platform: levoit
    levoit: levoitvital100
    name: "Filter Low"
    type: filter_low