#example levoit-core200s.yaml for flashing the original ESP32-SOLO-1C
substitutions:
  device_name: levoit-core200s
  wifi_ap_ssid: "Levoit-Core200S"
  rx_pin: GPIO17
  tx_pin: GPIO16

esphome:
  name: levoit-core200s

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

external_components:
  - source:
      type: git
      url: https://github.com/tuct/levoit
      ref: main
    components: [levoit]
logger:  
  level: VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${wifi_ap_ssid}"
    password: !secret wifi_ap_password

captive_portal:

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: ${tx_pin}
      inverted: false
    rx_pin: 
      number: ${rx_pin}
      inverted: false
    baud_rate: 115200

levoit:
  id: levoitcore200 
  model: CORE200S
fan:
  - platform: levoit
    levoit: levoitcore200
    name: "Fan"
    id: levoit_fan1  
switch:
  - platform: levoit
    levoit: levoitcore200
    name: "Display"
    type: display
  - platform: levoit
    levoit: levoitcore200
    name: "Child Lock"
    type: child_lock

number:
  - platform: levoit
    levoit: levoitcore200
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: levoitcore200
    name: "Filter Months"
    type: filter_lifetime_months

sensor:
  - platform: levoit
    levoit: levoitcore200
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: levoitcore200
    name: "Filter %"
    type: filter_life_left

text_sensor:
  - platform: levoit
    levoit: levoitcore200
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: levoitcore200
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: levoitcore200
    name: "Timer Duration"
    type: timer_duration_initial
  - platform: levoit
    levoit: levoitcore200
    name: "Timer Remaining"
    type: timer_duration_remaining
  - platform: levoit
    levoit: levoitcore200
    name: "Error"
    type: error_message
button:
  - platform: levoit
    levoit: levoitcore200
    name: "Filter Reset"
    type: reset_filter_stats
binary_sensor:
  - platform: levoit
    levoit: levoitcore200
    name: "Filter Low"
    type: filter_low
select:
  - platform: levoit
    levoit: levoitcore200
    name: "Night Light"
    type: nightlight
