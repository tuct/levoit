# Do not use this file directly, it is included in the device yaml files. Put common configuration here.
# Enable logging
logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${wifi_ap_ssid}"
    password: !secret wifi_ap_password

captive_portal:

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: ${tx_pin}
      inverted: false
    rx_pin:
      number: ${rx_pin}
      inverted: false
    baud_rate: 115200

levoit:
  id: leveverestair
  model: EVERESTAIR

fan:
  - platform: levoit
    levoit: leveverestair
    name: "Fan"
    id: levoit_fan1

switch:
  - platform: levoit
    levoit: leveverestair
    name: "Display"
    type: display
  - platform: levoit
    levoit: leveverestair
    name: "Child Lock"
    type: child_lock
  - platform: levoit
    levoit: leveverestair
    name: "Light Detect"
    type: light_detect

number:
  - platform: levoit
    levoit: leveverestair
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: leveverestair
    name: "Filter Months"
    type: filter_lifetime_months
  # EverestAir-specific: vent louver angle 45–90° (CMD 02 12 55)
  - platform: levoit
    levoit: leveverestair
    name: "Vent Angle"
    type: vent_angle

sensor:
  - platform: levoit
    levoit: leveverestair
    name: "PM 1.0"
    type: pm1_0
  - platform: levoit
    levoit: leveverestair
    name: "PM 2.5"
    type: pm25
  - platform: levoit
    levoit: leveverestair
    name: "PM 10"
    type: pm10
  - platform: levoit
    levoit: leveverestair
    name: "AQI"
    type: aqi
  - platform: levoit
    levoit: leveverestair
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: leveverestair
    name: "Filter %"
    type: filter_life_left

select:
  - platform: levoit
    levoit: leveverestair
    name: "Fan Operating Mode"
    type: fan_operating_mode
  - platform: levoit
    levoit: leveverestair
    name: "Auto Mode"
    type: auto_mode

text_sensor:
  - platform: levoit
    levoit: leveverestair
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: leveverestair
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: leveverestair
    name: "Timer Duration"
    type: timer_duration_initial
  - platform: levoit
    levoit: leveverestair
    name: "Timer Remaining"
    type: timer_duration_remaining
  - platform: levoit
    levoit: leveverestair
    name: "Error"
    type: error_message

button:
  - platform: levoit
    levoit: leveverestair
    name: "Filter Reset"
    type: reset_filter_stats

binary_sensor:
  - platform: levoit
    levoit: leveverestair
    name: "Filter Low"
    type: filter_low
  - platform: levoit
    levoit: leveverestair
    name: "Cover Open"
    type: cover_open
