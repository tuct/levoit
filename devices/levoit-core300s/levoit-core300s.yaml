
esphome:
  name: levoit-core300s-s3
  # remove if you use original ESP32-SOLO-1C!
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio 

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    
# original ESP32-SOLO-1C!
#esphome:
#  name: levoit-core300s-s3
#esp32:
#  board: esp32dev
#  framework:
#    type: esp-idf
#    sdkconfig_options:
#      CONFIG_FREERTOS_UNICORE: y

# Enable logging
logger:  
  level: VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: "mista3"
  password: !secret wifi_password
  power_save_mode: none
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Levoit-Vital100S"
    password: !secret wifi_ap_password

captive_portal:

#debug:
#  update_interval: 5s




external_components:
  - source: ../../../components
    components: [levoit]

#external_components:
#  - source:
#      type: git
#      url: https://github.com/tuct/esphome-projects
#      ref: main
#    components: [levoit]
##   refresh: 1s #force update during development or after fixes

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: GPIO04
      inverted: false
    rx_pin: 
      number: GPIO05
      inverted: false
    baud_rate: 115200

levoit:
  id: levoitcore300
  model: CORE300S
fan:
  - platform: levoit
    levoit: levoitcore300
    name: "Fan"
    id: levoit_fan1  
switch:
  - platform: levoit
    levoit: levoitcore300
    name: "Display"
    type: display
  - platform: levoit
    levoit: levoitcore300
    name: "Child Lock"
    type: child_lock

number:
  - platform: levoit
    levoit: levoitcore300
    name: "Auto Mode Room Size"
    type: efficiency_room_size
  - platform: levoit
    levoit: levoitcore300
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: levoitcore300
    name: "Filter Months"
    type: filter_lifetime_months
sensor:

  - platform: levoit
    levoit: levoitcore300
    name: "AQ - PM 2.5"
    type: pm25
  - platform: levoit
    levoit: levoitcore300
    name: "AQI"
    type: aqi
  - platform: levoit
    levoit: levoitcore300
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: levoitcore300
    name: "Filter %"
    type: filter_life_left


# Better: auto_mode_room_size_high_fan text_sensor    
#  - platform: levoit
#    levoit: levoitcore300
#    name: "Efficiency Count Dowmn Timer (sec)"
#    type: efficiency_counter
# Better: timer_duration_remaining text_sensor    
#  - platform: levoit
#    levoit: levoitcore300
#    name: "Timer Remaining"
#    type: timer_current
select:
  - platform: levoit
    levoit: levoitcore300
    name: "Auto Mode"
    type: auto_mode
text_sensor:
  - platform: levoit
    levoit: levoitcore300
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: levoitcore300
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: levoitcore300
    name: "Timer Duration"
    type: timer_duration_initial
  - platform: levoit
    levoit: levoitcore300
    name: "Timer Remaining"
    type: timer_duration_remaining
  - platform: levoit
    levoit: levoitcore300
    name: "Error"
    type: error_message

button:
  - platform: levoit
    levoit: levoitcore300
    name: "Filter Reset"
    type: reset_filter_stats
binary_sensor:
  - platform: levoit
    levoit: levoitcore300
    name: "Filter Low"
    type: filter_low
#  Only for Vital100S and Vital200S
