#Do not use this file directly, it is included in the device yaml files. Put common configuration here.
# Enable logging
logger:
  level: VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${wifi_ap_ssid}"
    password: !secret wifi_ap_password

captive_portal:

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: ${tx_pin}
      inverted: false
    rx_pin:
      number: ${rx_pin}
      inverted: false
    baud_rate: 115200

levoit:
  id: levoitsprout
  model: SPROUT

fan:
