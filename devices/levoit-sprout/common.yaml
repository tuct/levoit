    name: "PM 2.5"
    type: pm25
    id: sprout_pm25
  - platform: levoit
    levoit: levoitsprout
    name: "PM 1.0"
    type: pm1_0
  - platform: levoit
    levoit: levoitsprout
    name: "PM 10"
    type: pm10
    id: sprout_pm10
