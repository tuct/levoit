  - platform: levoit
    levoit: levoitsprout
    name: "Filter %"
    type: filter_life_left

light:
  - platform: levoit
    levoit: levoitsprout
    name: "LED Ring"
    gamma_correct: 0
    default_transition_length: 0s

select:
  - platform: levoit
    levoit: levoitsprout
    name: "Auto Mode"
